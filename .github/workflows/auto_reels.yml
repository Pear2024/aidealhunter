name: Facebook Auto-Reels Agent

on:
  schedule:
    # Every 30 minutes to saturate the Facebook Reels algorithm
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual triggering to test immediately

jobs:
  generate-and-post-reel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install FFmpeg natively on Ubuntu VM
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Install NPM Dependencies
      run: |
        cd web-dashboard
        npm install

    - name: Render Video and Post to Facebook Graph API
      env:
        # Secure bindings pulling from GitHub Action Secrets
        MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
        MYSQL_USER: ${{ secrets.MYSQL_USER }}
        MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
        MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
      run: |
        cd web-dashboard
        node generate_reel.js

