name: 🩺 Medical AI Health Content Cron

on:
  schedule:
    # Runs 2 times a day (Morning 07:15 and Evening 18:15 in Asia/Bangkok -> 00:15 UTC and 11:15 UTC)
    - cron: '15 0,11 * * *'
  # Allows manual triggering
  workflow_dispatch:

jobs:
  dispatch-health-content:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Invoking Medical AI Content Generator
        run: |
          echo "Triggering DALL-E 3 image generation and Facebook photo post..."
          curl -f -v -m 120 "https://aidealhunter.vercel.app/api/cron/health-content?key=super_secret_ai_cron_password_123"
          echo -e "\n\n✅ Mission complete. The Health Tech news is live on Facebook and the native website."
