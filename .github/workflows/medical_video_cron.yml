name: 🧬 Medical AI Daily Video Generator

on:
  schedule:
    # Runs at 14:00 UTC (around morning in US) every day
    - cron: '0 14 * * *'
  # Allows triggering manually from the Actions tab
  workflow_dispatch:

jobs:
  generate-medical-video:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: |
          cd web-dashboard
          npm install

      - name: 🎥 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: ⚡ Run Medical AI Video Engine via AIMLAPI
        env:
          AIMLAPI_KEY: ${{ secrets.AIMLAPI_KEY }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          cd web-dashboard
          node generate_medical_video.js
