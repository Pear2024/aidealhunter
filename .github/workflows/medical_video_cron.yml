name: 🧬 Medical AI Daily Video Generator

on:
  schedule:
    # Runs 1 time a day (Evening Prime Time 19:37 in Asia/Bangkok -> 12:37 UTC)
    - cron: '37 12 * * *'
  # Allows triggering manually from the Actions tab
  workflow_dispatch:
    inputs:
      live_fire_test:
        description: 'Type "COMMENT" here to trigger the intentional Live Fire Test for comment failure'
        required: false
        type: string
  # Added a push trigger so we can immediately trigger this workflow to test video generation
  push:
    branches: [ "main" ]

jobs:
  generate-medical-video:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: |
          cd web-dashboard
          npm install

      - name: 🎥 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: ⚡ Run Medical AI Video Engine (OpenAI + Gemini)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LIVE_FIRE_TEST: ${{ github.event.inputs.live_fire_test }}
        run: |
          cd web-dashboard
          node generate_health_reel.js
