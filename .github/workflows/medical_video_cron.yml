name: 🧬 Medical AI Daily Video Generator

on:
  schedule:
    # Runs 6 times a day (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    - cron: '0 0,4,8,12,16,20 * * *'
  # Allows triggering manually from the Actions tab
  workflow_dispatch:

jobs:
  generate-medical-video:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: |
          cd web-dashboard
          npm install

      - name: 🎥 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: ⚡ Run Medical AI Video Engine via AIMLAPI
        env:
          AIMLAPI_KEY: ${{ secrets.AIMLAPI_KEY }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
        run: |
          cd web-dashboard
          node generate_health_reel.js
