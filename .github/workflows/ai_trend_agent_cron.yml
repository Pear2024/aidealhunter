name: 📈 AI Trend Master Cron

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  dispatch-trend-squad:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Invoking LangGraph Trend Agent
        # Maximum timeout set to 120 seconds for safety
        run: |
          echo "Starting the Master Trend analysis process..."
          curl -v -m 120 "https://aidealhunter.vercel.app/api/cron/agent-trend?key=super_secret_ai_cron_password_123"
          echo -e "\n\n✅ Mission complete. The AI Trend Master has finished fetching new trends."
