name: Autonomous Health Reels Engine

on:
  schedule:
    # Runs every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  produce_reel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Dependencies
        working-directory: ./web-dashboard
        run: npm ci || npm install

      - name: Execute Autonomous Engine
        working-directory: ./web-dashboard
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          AIMLAPI_KEY: ${{ secrets.AIMLAPI_KEY }}
          
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          PUBLISH_ENABLED: "true"
          MAX_POSTS_PER_DAY: "2"
          BOOST_ENABLED: "false"
          OPTIMIZER_ENABLED: "false"
          
          # Native ffmpeg on ubuntu-latest
          FFMPEG_PATH: "ffmpeg"
        run: |
          echo "Starting Autonomous Engine on GitHub Actions..."
          node generate_health_reel.js
