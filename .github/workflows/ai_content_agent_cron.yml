name: 🤖 AI Content Agent Cron

on:
  schedule:
    # Runs every 3 hours (e.g. 00:00, 03:00, 06:00 UTC)
    - cron: '0 */3 * * *'
  # Allows you to trigger this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  dispatch-content-squad:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Invoking LangGraph Content Agent
        # We set the cURL max timeout (-m) to 120 seconds to safely accommodate DALL-E 3 & Gemini generations
        run: |
          echo "Starting the AI Content generation process..."
          curl -v -m 120 "https://aidealhunter.vercel.app/api/cron/agent-content?key=super_secret_ai_cron_password_123"
          echo -e "\n\n✅ Mission complete. The AI Agent has finished its execution window."
