name: 🛡️ AI QA Gatekeeper (Approval Squad)

on:
  schedule:
    # Runs every 15 minutes to constantly vet the Trending Product Pool
    - cron: '*/15 * * * *'
  # Allows triggering manually from the Actions tab
  workflow_dispatch:

jobs:
  dispatch-qa-squad:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Invoking LangGraph QA Gatekeeper
        run: |
          echo "Starting the autonomous Quality Assurance QA pipeline..."
          curl -v -m 120 "https://aidealhunter.vercel.app/api/cron/agent-qa?key=super_secret_ai_cron_password_123"
          echo -e "\n\n✅ Mission complete. The AI Gatekeeper has successfully vetted the pending pool."
